services:
  - type: web
    name: qnyzhuayu
    runtime: python
    plan: starter
    buildCommand: ./build.sh
    startCommand: gunicorn huayu_site.wsgi:application
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: qnyzhuayu.cn,www.qnyzhuayu.cn
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://qnyzhuayu.cn,https://www.qnyzhuayu.cn
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "True"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "True"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "31536000"
      - key: DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: DJANGO_SECURE_HSTS_PRELOAD
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: qnyzhuayu-db
          property: connectionString

databases:
  - name: qnyzhuayu-db
    plan: starter
